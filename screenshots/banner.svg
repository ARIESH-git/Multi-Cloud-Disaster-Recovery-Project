<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Multi-Cloud Disaster Recovery — AWS primary, Azure secondary, automatic failover</title>
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0b1220"/>
<stop offset="55%" stop-color="#101a2e"/>
<stop offset="100%" stop-color="#161129"/>
</linearGradient>
<linearGradient id="awsGlow" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#FF9900"/>
<stop offset="100%" stop-color="#e07d00"/>
</linearGradient>
<linearGradient id="azureGlow" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#3ccbf4"/>
<stop offset="100%" stop-color="#0089D6"/>
</linearGradient>
<marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M1 1L9 5L1 9" fill="none" stroke="#8a93a6" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="1200" height="300" fill="url(#bg)"/>

<circle cx="80" cy="60" r="1.6" fill="#4b5566"/>
<circle cx="140" cy="220" r="1.6" fill="#4b5566"/>
<circle cx="1120" cy="50" r="1.6" fill="#4b5566"/>
<circle cx="1080" cy="250" r="1.6" fill="#4b5566"/>
<circle cx="600" cy="30" r="1.6" fill="#4b5566"/>

<text x="600" y="72" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="600" fill="#f5f7fa">Multi-Cloud Disaster Recovery</text>
<text x="600" y="102" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#9aa4b8">Terraform &#183; Ansible &#183; Jenkins &#183; AWS &#183; Azure &#183; Route 53</text>

<g>
<rect x="130" y="150" width="230" height="92" rx="10" fill="#1a2233" stroke="url(#awsGlow)" stroke-width="1.6"/>
<circle cx="168" cy="182" r="14" fill="url(#awsGlow)"/>
<path d="M161 182 h14 M168 175 v14" stroke="#1a1200" stroke-width="2" stroke-linecap="round"/>
<text x="194" y="178" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#f5f7fa">AWS</text>
<text x="194" y="198" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#9aa4b8">us-east-1 &#183; primary</text>
<text x="150" y="222" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#7d8699">EC2 &#183; VPC &#183; S3 state &#183; Jenkins</text>
</g>

<g>
<rect x="840" y="150" width="230" height="92" rx="10" fill="#1a2233" stroke="url(#azureGlow)" stroke-width="1.6"/>
<circle cx="878" cy="182" r="14" fill="url(#azureGlow)"/>
<path d="M871 182 h14 M878 175 v14" stroke="#00202e" stroke-width="2" stroke-linecap="round"/>
<text x="904" y="178" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#f5f7fa">Azure</text>
<text x="904" y="198" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#9aa4b8">East US &#183; secondary</text>
<text x="860" y="222" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#7d8699">VM &#183; VNet &#183; NSG &#183; standby</text>
</g>

<rect x="460" y="150" width="280" height="92" rx="10" fill="#1a2233" stroke="#3d4658" stroke-width="1.2"/>
<text x="600" y="180" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#f5f7fa">Route 53</text>
<text x="600" y="199" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#9aa4b8">health check + failover routing</text>
<text x="600" y="219" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#7d8699">app.upgrad.com</text>

<line x1="360" y1="196" x2="452" y2="196" stroke="#8a93a6" stroke-width="1.6" marker-end="url(#arrowhead)"/>
<line x1="748" y1="196" x2="832" y2="196" stroke="#8a93a6" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrowhead)"/>
<text x="790" y="140" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#6ee7ff">on failure &#8594;</text>

</svg>
